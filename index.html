<!-- 4. The "No-Cache" Header Logic
To stop the Auto-Refresh when you return to the tab, you can tell the browser to "State-Check" before it reloads.
The Fix: In your index.html, add this meta tag to discourage the browser from thinking the page is "old" and needs a hard refresh: -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Spotify App</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="manifest" href="/manifest.json">
   <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <script>
        // Catch the event as early as possible
        window.deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            console.warn("PWA: captured beforeinstallprompt event!");
            e.preventDefault();
            window.deferredPrompt = e;
            // Dispatch a custom event so app.js knows it's time to show the button
            window.dispatchEvent(new Event('pwa-installable'));
        });
    </script>

</head>
<body>
    <div id="offline-status" style="display: none;">
        <span>📡 Waiting for signal...</span>
    </div>
    <!-- Top-level Authentication Bar -->
    <header style="padding: 10px; background: #121212; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: #1DB954; margin: 0; font-size: 1.2em;">Mixer Lab</h1>
        <div id="session-info" style="font-size: 0.8em; color: #535353; margin-top: 10px;">
            Session Expires in: <span id="timer-display">--:--</span>
        </div>
        <button id="install-pwa-btn" class="action-btn" style="display: none; background-color: #1DB954; color: white;">
            Install App to Home Screen
        </button>
        <button id="login-button" style="background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">
            Login with Spotify
        </button>
        <!-- Add to your HTML -->
        <div id="resume-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
            <h3 style="color:white;">Mixer Paused</h3>
            <p style="color:#b3b3b3; text-align:center; padding:0 20px;">Playback moved to another app or device.</p>
            <button onclick="resumeOnThisDevice()" style="background:#1DB954; color:white; border:none; padding:15px 30px; border-radius:30px; font-weight:bold; font-size:1.1em; cursor:pointer;">
                ▶ Resume Mixer Here
            </button>
        </div>

        <!-- Add this inside your <body>, maybe in your header -->
        <!-- <div id="player-controls" style="padding: 10px; text-align: center; display: flex; justify-content: center; align-items: center; "> -->
            <button id="init-player" style="background: #ff0000; color: white; padding: 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer;">
                🔌 Power On Mixer
            </button>
            <!-- <button id="play-pause-btn" style="display: none; background: white; padding: 12px; border-radius: 25px; border: none; font-weight: bold;">
                Play/Pause
            </button> -->
            <button id="play-pause" style="background: #1DB954; color: white; padding: 10px 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer;">
                ▶ Play
            </button>

        <!-- </div> -->
    </header>

    <h1>Ben Burt Spotify Playlist Mixer</h1>
    <!-- <button id="pick">Pick Random Song</button> -->
    <section id="mix-combiner-section">
        <h3>Combine Mixes:</h3>
        <div id="stored-mixes-container" style="background: #ddf1fd; padding: 10px; border-radius: 8px;">
            <!-- Your existing list -->
            <div id="stored-mixes-list" class="mix-list-container" style="font-weight: bold; padding: 20px; max-height: 50px; overflow-y: auto; transition: max-height 0.3s ease;">
                <!-- Lines for each mix will be injected here -->
            </div>
        </div>
            <!-- The Toggle Button -->
            <button id="toggle-list-btn-mix" style="display: block; margin: 5px auto 0; width: 80%; background: #66ff00; border-radius: 30px; border: none; color: #070707; cursor: pointer; padding: 5px; font-size: 0.8em; margin-top: 5px;">
                ▼ Show All
            </button>
        
        <div class="combine-controls">
            <input type="text" id="combine-mix-name" placeholder="New Mix Name" class="mix-input" style="font-size: 1.5rem;">
            <button onclick="combineSelectedMixes()" 
                class="action-btn combine"
                style="background: #0061cf  ; color: white; border: 1px solid #1DB954; padding: 8px 15px; border-radius: 20px; cursor: pointer;""
                >
                Combine Selected
            </button>
        </div>
    </section>
    <section>
        <h3>Playlists:</h3>
        <div id="playlist-inputs">
            <input type="text" id="new-playlist-name" style="font-size: 1.5rem;" placeholder="Playlist Name">
            <input type="number" id="new-playlist-count" style="font-size: 1.5rem; width: 150px" placeholder="Track Count" min="1">
            <button id="add-playlist"
                style="background: #0061cf; color: white; border: 1px solid #1DB954; padding: 8px 15px; border-radius: 20px; cursor: pointer;"
            >Add Playlist</button>
        </div>

        <div id="mix-controls">            
            <input id="new-mix-name" style="font-size: 1.5rem;" placeholder="Mix name">
            <button id="save-mix"
                style="background: #0061cf; color: white; border: 1px solid #1DB954; padding: 8px 15px; border-radius: 20px; cursor: pointer;"
            >Save Mix</button>
        </div>

        <div>
            <select id="mix-selector" style="font-size: 1.5rem;" ></select>
            <button id="add-to-combiner-btn" 
                    class="action-btn" 
                    style="background: #0061cf; color: white; border: 1px solid #1DB954; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;"
                    onclick="addActiveToCombineList()" 
                    title="Add current mix to the combiner tool below">
                Add to Combiner
            </button>
            <button id="delete-mix-btn" onclick="deleteCurrentMix()" style="background: #e91429; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;">
                🗑️ Delete
            </button>
            <button id="share-mix-btn" style="background: #0061cf; color: white; border: 1px solid #1DB954; padding: 8px 15px; border-radius: 20px; cursor: pointer;">
                🔗 Share Current Mix
            </button>
            <!-- Import Button -->
            <button id="import-trigger-btn" style="background: #0061cf; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 20px; cursor: pointer;">
                📥 Import Mix JSON
            </button>

            
            <!-- Hidden file input that we'll "click" via JavaScript -->
            <input type="file" id="import-file-input" accept=".json" style="display: none;">

        </div>

        <!-- ========================= -->
        <!-- Playlist balancing -->
        <!-- ========================= -->
        <div id="mode-description">
            <p id="mode-text"></p>
        </div>
        <div id="selection-modes">
            <label>
                <input type="radio" name="selectionMode" value="balanced">
                Balanced
            </label>
            <label>
                <input type="radio" name="selectionMode" value="percentage">
                Percentage Mix
            </label>
            <label>
                <input type="radio" name="selectionMode" value="normal" checked>
                Normal
            </label>
            <label>
                <input type="radio" name="selectionMode" value="relative">
                Relative Weight
            </label>
        </div>
        <div class="master-toggle-container">
            <label>
                <input type="checkbox" id="master-playlist-toggle" checked>
                Enable/Disable All Playlists
            </label>
        </div>
        <!-- <div id="playlist-list"></div> -->
        <!-- <div id="playlist-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto;">
        </div> -->
        <div id="playlist-container" style="background: #ddf1fd; padding: 10px; border-radius: 8px;">
            <!-- The Toggle Button -->
            <button class="toggle-list-btn-class" id="toggle-list-btn1" style="display: block; margin: 5px auto 0; width: 80%; background: #66ff00; border-radius: 30px; border: none; color: #070707; cursor: pointer; padding: 5px; font-size: 0.8em; margin-top: 5px;">
                ▼ Show All
            </button>
            <!-- Your existing list -->
            <div id="playlist-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto; transition: max-height 0.3s ease;">
                <!-- Playlists go here -->
            </div>
            
            <!-- The Toggle Button -->
            <button class="toggle-list-btn-class" id="toggle-list-btn2" style="display: block; margin: 5px auto 0; width: 80%; background: #66ff00; border-radius: 30px; border: none; color: #070707; cursor: pointer; padding: 5px; font-size: 0.8em; margin-top: 5px;">
                ▼ Show All
            </button>
        </div>

    </section>

    <div id="now-playing-container" style="background: #181818; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center;">
        <!-- Album Art -->
        <img id="album-art" src="" style="width: 200px; height: 200px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px;">
        
        <!-- Track Info -->
        <div style="margin-bottom: 20px;">
            <div id="track-name" style="font-weight: bold; font-size: 1.2em; color: white;">No Song Playing</div>
            <div id="track-artist" style="color: #b3b3b3; font-size: 0.9em;">---</div>
            <div id="playlist-name" style="font-weight: bold; font-size: 1.2em; color: white;">No Playlist</div>
        </div>

        <!-- Progress Bar -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; justify-content: center;">
            <span id="current-time" style="font-size: 0.8em; color: #b3b3b3; width: 40px;">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0" style="cursor: pointer; width: 50%">
            <span id="duration-time" style="font-size: 0.8em; color: #b3b3b3; width: 40px;">0:00</span>
        </div>

        <!-- Main Controls
        <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px;">
            <button onclick="seekRelative(-15000)" style="background:none; border:none; color:white; font-size:1.5em; cursor:pointer;">↺ 15s</button>
            <button id="play-pause-btn" onclick="togglePlay()" style="background:#1DB954; color:white; border:none; width:50px; height:50px; border-radius:50%; font-size:1.2em; cursor:pointer;">▶</button>
            <button onclick="player.nextTrack()" style="background:none; border:none; color:white; font-size:1.5em; cursor:pointer;">↻</button>
            <button onclick="seekRelative(15000)" style="background:none; border:none; color:white; font-size:1.5em; cursor:pointer;">15s ⏩</button>
        </div> -->
        <!-- Main Controls Container -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px;">
            
            <!-- Seek Back 15s -->
            <button class="circular-control-btn" onclick="seekRelative(-15000)" title="Back 15s">
                <span style="font-size: 1.2em; position: relative; top: -1px;">↺</span>
                <span style="font-size: 0.6em; position: absolute; top: 5px;">15</span>
            </button>
            
            <button id="back-button" class="circular-control-btn"
                    onclick="playPreviousTrack();" 
                    title="Previous Song"
                >
                ⏮
            </button>

            <!-- Play/Pause (Circular Green) -->
            <button id="play-pause-btn" class="circular-control-btn" 
                    onclick="userInitiatedPause = true; player.togglePlay();" 
                    title="Play/Pause"
                >
                ▶
            </button>

            <!-- Next Song -->
            <button class="circular-control-btn" 
                    onclick="playNextTrack();" 
                    title="Next Song"
                >
                ⏭
            </button>

            <!-- Seek Forward 15s -->
            <button class="circular-control-btn" onclick="seekRelative(15000)" title="Forward 15s">
                <span style="font-size: 1.2em; position: relative; top: -1px;">↻</span>
                <span style="font-size: 0.6em; position: absolute; top: 5px;">15</span>
            </button>
        </div>
        <!-- Volume Control -->
        <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
            <span style="color:#b3b3b3;">🔈</span>
            <input type="range" id="volume-bar" min="0" max="100" value="50" style="width: 30%; cursor: pointer;">
            <span style="color:#b3b3b3;">🔊</span>
        </div>
    </div>
    
    <section>
        <h1> </h1>
        <button id="pick" style="padding: 8px 15px; border-radius: 30px; cursor: pointer;">Pick Random Song</button>
        <button id="skip-button"  style="padding: 8px 15px; border-radius: 30px; cursor: pointer;" class="mixer-control">Skip to Next</button>
        <p id="result"></p>
    </section>

    <!-- Manual Playback Entry -->
    <div id="manual-play-container" style="margin-top: 15px; display: flex; gap: 10px;">
        <input type="text" id="manual-uri-input" placeholder="Paste spotify:track:URI here..." 
            style="flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #121212; color: white;">
        <button id="manual-retry-btn" 
                style="background: #36e930; color: black; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;">
            Play URI
        </button>
    </div>

    <!-- Add this below your playlist-list div -->
    <div id="history-container" style="margin-top: 20px; padding: 10px; background: #181818; border-radius: 8px; color: #b3b3b3;">
        <h3 style="color: white; margin-top: 0;">Mix History</h3>
        <div id="history-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto;">
            <!-- New songs will appear here -->
            <p>No songs played yet...</p>
        </div>
    </div>
    <div id="queue-container" class="mixer-panel" style="margin-top: 20px; padding: 15px; background: #181818; border-radius: 8px; color: #b3b3b3;">
        <h3>Upcoming Mix</h3>
        <ul id="queue-list" style="max-height: 150px; overflow-y: auto;">
            <!-- Queue items will appear here -->
        </ul>
    </div>

    <!-- ========================= -->
    <!-- Playlist Generator UI -->
    <!-- ========================= -->
    <div id="playlist-generator">
        <input
            type="number"
            id="playlist-size"
            min="1"
            max="500"
            value="50"
            placeholder="Number of tracks"
        >
        <button id="generate-playlist">
            Generate Playlist
        </button>
    </div>
    <!-- ========================= -->

    <!-- ========================= -->
    <!-- Generated Playlist Output -->
    <!-- ========================= -->
    <div id="generated-playlist-container">
        <div class="playlist-header">
            <span>Playlist</span>
            <span>Track #</span>
        </div>
        <div id="generated-playlist"></div>
    </div>

    <!-- 1. Define the "Ready" function globally first -->
    <script>
    window.onSpotifyWebPlaybackSDKReady = () => {
        console.log("Spotify SDK is ready!");
        // This just alerts us that the SDK is alive. 
        // We handle the actual player setup in app.js via the button click.
    };
    </script>

    <!-- ========================= -->
    <!-- Spotify Web Playback SDK -->
    <!-- ========================= -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>

    <!-- Adding v=timestamp to FORCE no caching of app.js - so newest version is always pulled down -->
    <script src="app.js?v=20260421"></script>

</body>
</html>
