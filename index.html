<!-- 4. The "No-Cache" Header Logic
To stop the Auto-Refresh when you return to the tab, you can tell the browser to "State-Check" before it reloads.
The Fix: In your index.html, add this meta tag to discourage the browser from thinking the page is "old" and needs a hard refresh: -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Spotify App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top-level Authentication Bar -->
    <header style="padding: 10px; background: #121212; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: #1DB954; margin: 0; font-size: 1.2em;">Mixer Lab</h1>
        <div id="session-info" style="font-size: 0.8em; color: #535353; margin-top: 10px;">
            Session Expires in: <span id="timer-display">--:--</span>
        </div>
        <button id="login-button" style="background: #ff0000; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">
            Login with Spotify
        </button>
        <!-- Add to your HTML -->
        <div id="resume-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
            <h3 style="color:white;">Mixer Paused</h3>
            <p style="color:#b3b3b3; text-align:center; padding:0 20px;">Playback moved to another app or device.</p>
            <button onclick="resumeOnThisDevice()" style="background:#1DB954; color:white; border:none; padding:15px 30px; border-radius:30px; font-weight:bold; font-size:1.1em; cursor:pointer;">
                ▶ Resume Mixer Here
            </button>
        </div>

        <!-- Add this inside your <body>, maybe in your header -->
        <div id="player-controls" style="margin: 10px; text-align: center;">
            <button id="init-player" style="background: #ff0000; color: white; padding: 12px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer;">
                🔌 Power On Mixer
            </button>
            <button id="play-pause-btn" style="display: none; background: white; padding: 12px; border-radius: 25px; border: none; font-weight: bold;">
                Play/Pause
            </button>
            // Example Button HTML
            <button id="play-pause" style="background: #1DB954; color: white; padding: 10px 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer;">
                ▶ Play
            </button>

        </div>
    </header>

    <h1>Ben Burt Spotify Playlist Mixer</h1>
    <!-- <button id="pick">Pick Random Song</button> -->
    <section>
        <h3>Playlists:</h3>
        <div id="playlist-inputs">
            <input type="text" id="new-playlist-name" placeholder="Playlist Name">
            <input type="number" id="new-playlist-count" placeholder="Track Count" min="1">
            <button id="add-playlist">Add Playlist</button>
        </div>

        <div id="mix-controls">            
            <input id="new-mix-name" placeholder="Mix name">
            <button id="save-mix">Save Mix</button>
        </div>

        <div>
            <select id="mix-selector"></select>
            <button id="share-mix-btn" style="background: #191414; color: white; border: 1px solid #1DB954; padding: 5px 10px; border-radius: 20px; cursor: pointer;">
                🔗 Share Current Mix
            </button>

        </div>

        <!-- ========================= -->
        <!-- Playlist balancing -->
        <!-- ========================= -->
        <div id="mode-description">
            <p id="mode-text"></p>
        </div>
        <div id="selection-modes">
            <label>
                <input type="radio" name="selectionMode" value="balanced">
                Balanced
            </label>
            <label>
                <input type="radio" name="selectionMode" value="percentage">
                Percentage Mix
            </label>
            <label>
                <input type="radio" name="selectionMode" value="normal" checked>
                Normal
            </label>
            <label>
                <input type="radio" name="selectionMode" value="relative">
                Relative Weight
            </label>
        </div>

        <!-- <div id="playlist-list"></div> -->
        <!-- <div id="playlist-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto;">
        </div> -->
        <div id="playlist-container" style="background: #ddf1fd; padding: 10px; border-radius: 8px;">
            <!-- Your existing list -->
            <div id="playlist-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto; transition: max-height 0.3s ease;">
                <!-- Playlists go here -->
            </div>
            
            <!-- The Toggle Button -->
            <button id="toggle-list-btn" style="width: 100%; background: none; border: none; color: #070707; cursor: pointer; padding: 5px; font-size: 0.8em; margin-top: 5px;">
                ▼ Show All
            </button>
        </div>

    </section>

    <section>
        <h1> </h1>
        <button id="pick">Pick Random Song</button>
        <button id="skip-button" class="mixer-control">Skip to Next</button>
        <p id="result"></p>
    </section>

    <!-- Manual Playback Entry -->
    <div id="manual-play-container" style="margin-top: 15px; display: flex; gap: 10px;">
        <input type="text" id="manual-uri-input" placeholder="Paste spotify:track:URI here..." 
            style="flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #333; background: #121212; color: white;">
        <button id="manual-retry-btn" 
                style="background: #36e930; color: black; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;">
            Play URI
        </button>
    </div>

    <!-- Add this below your playlist-list div -->
    <div id="history-container" style="margin-top: 20px; padding: 10px; background: #181818; border-radius: 8px; color: #b3b3b3;">
        <h3 style="color: white; margin-top: 0;">Mix History</h3>
        <div id="history-list" style="font-size: 0.9em; max-height: 200px; overflow-y: auto;">
            <!-- New songs will appear here -->
            <p>No songs played yet...</p>
        </div>
    </div>
    <div id="queue-container" class="mixer-panel" style="margin-top: 20px; padding: 15px; background: #181818; border-radius: 8px; color: #b3b3b3;">
        <h3>Upcoming Mix</h3>
        <ul id="queue-list" style="max-height: 150px; overflow-y: auto;">
            <!-- Queue items will appear here -->
        </ul>
    </div>

    <!-- ========================= -->
    <!-- Playlist Generator UI -->
    <!-- ========================= -->
    <div id="playlist-generator">
        <input
            type="number"
            id="playlist-size"
            min="1"
            max="500"
            value="50"
            placeholder="Number of tracks"
        >
        <button id="generate-playlist">
            Generate Playlist
        </button>
    </div>
    <!-- ========================= -->

    <!-- ========================= -->
    <!-- Generated Playlist Output -->
    <!-- ========================= -->
    <div id="generated-playlist-container">
        <div class="playlist-header">
            <span>Playlist</span>
            <span>Track #</span>
        </div>
        <div id="generated-playlist"></div>
    </div>

    <!-- 1. Define the "Ready" function globally first -->
    <script>
    window.onSpotifyWebPlaybackSDKReady = () => {
        console.log("Spotify SDK is ready!");
        // This just alerts us that the SDK is alive. 
        // We handle the actual player setup in app.js via the button click.
    };
    </script>

    <!-- ========================= -->
    <!-- Spotify Web Playback SDK -->
    <!-- ========================= -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>

    <script src="app.js"></script>

</body>
</html>
